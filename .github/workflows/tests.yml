name: tests

# Sprint 6 (2026-04-08): CI gating para todo PR contra main.
# Roda a suite completa em tests/ + smoke do CLI doctor + lint do catalog.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio pyyaml pytest-cov

      - name: Run tests with coverage
        env:
          # Chaves dummy para satisfazer LLMConfig.available — testes nao
          # tocam APIs reais, sao todos mockados ou unit-level.
          ANTHROPIC_API_KEY: test-key-not-real
          OPENAI_API_KEY: test-key-not-real
          GOOGLE_AI_API_KEY: test-key-not-real
          PERPLEXITY_API_KEY: test-key-not-real
          GROQ_API_KEY: test-key-not-real
        run: pytest -v --tb=short --cov=src --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-geo-orchestrator
          fail_ci_if_error: false

      - name: Smoke CLI doctor
        env:
          ANTHROPIC_API_KEY: test-key-not-real
          OPENAI_API_KEY: test-key-not-real
          GOOGLE_AI_API_KEY: test-key-not-real
          PERPLEXITY_API_KEY: test-key-not-real
          GROQ_API_KEY: test-key-not-real
        run: |
          python cli.py --help
          python cli.py doctor --json

      - name: Validate catalog YAML
        run: |
          python -c "from src.catalog_loader import assert_catalog_consistent; assert_catalog_consistent(); print('catalog OK')"
