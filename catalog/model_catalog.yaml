# Model Catalog — Single Source of Truth
# All pricing, routing, budgets and capabilities derive from this file.
# Sprint 5 (2026-04-08): re-sincronizado com src/config.LLM_CONFIGS canonicos.
# Generated artifacts: config.py tables, README pricing, site page, CLI help.

version: "2.1"
last_updated: "2026-05-17"
# 2026-05-17 Sprint 12 — diretriz canonica:
#   * COPY (writing/copywriting/seo) so usa modelos PREMIUM-tier:
#     gpt-5.5 (OpenAI flagship), claude-opus-4-7 (Anthropic flagship)
#     ou gemini-2.5-pro (Google flagship). Sonnet/Haiku/Flash banidos
#     de copy. Refletido em task_routing + FALLBACK_CHAINS no config.py.
#   * RESEARCH (research/fact_check) com perplexity sonar-deep-research
#     como prioridade absoluta. Cap por provider voltou 0.35 -> 0.50
#     (era de Sprint 10/bateria 360 e sufocava deep research editorial).

providers:
  anthropic:
    display_name: "Anthropic"
    api_key_env: ANTHROPIC_API_KEY
    models:
      claude-opus-4-7:
        display: "Claude Opus 4.7"
        input_cost_per_mtok: 15.00
        output_cost_per_mtok: 75.00
        max_tokens: 32000
        rpm: 60
        capabilities: [architecture, code_generation, review, deep_reasoning]
        tier: premium
        complexity_min: 4
        config_alias: claude
        status: active
      claude-sonnet-4-6:
        display: "Claude Sonnet 4.6"
        input_cost_per_mtok: 3.00
        output_cost_per_mtok: 15.00
        max_tokens: 64000
        rpm: 100
        capabilities: [writing, analysis, classification, code_generation, review]
        tier: standard
        complexity_min: 3
        config_alias: claude_sonnet
        status: active
      claude-haiku-4-5:
        display: "Claude Haiku 4.5"
        input_cost_per_mtok: 0.80
        output_cost_per_mtok: 4.00
        max_tokens: 64000
        rpm: 200
        capabilities: [classification, summarization, translation, simple_code]
        tier: economy
        complexity_min: 1
        config_alias: claude_haiku
        status: active

  openai:
    display_name: "OpenAI"
    api_key_env: OPENAI_API_KEY
    models:
      gpt-5.5:
        display: "GPT-5.5"
        # 2026-05-17 Sprint 12 — sincronizado com config.py canonico.
        # Upgrade Sprint 11 ja havia trocado o model_id no config.py
        # (gpt-4o -> gpt-5.5, lancado 23-abr-2026); catalog YAML estava
        # em drift desde entao. Sprint 12 fecha o drift e promove gpt-5.5
        # a model PREMIUM canonico de writing/copywriting/seo (diretriz
        # COPY PREMIUM ONLY). Reasoning nativo + 1M ctx + pt-BR otimizado.
        input_cost_per_mtok: 5.00
        output_cost_per_mtok: 15.00
        max_tokens: 32768
        rpm: 60
        capabilities: [writing, seo, copywriting, analysis, translation, reasoning]
        tier: premium
        complexity_min: 3
        config_alias: gpt4o
        status: active

  google:
    display_name: "Google"
    api_key_env: GOOGLE_AI_API_KEY
    models:
      gemini-2.5-pro:
        display: "Gemini 2.5 Pro"
        input_cost_per_mtok: 1.25
        output_cost_per_mtok: 5.00
        max_tokens: 65536
        rpm: 30
        capabilities: [deep_analysis, code_generation, data_processing, reasoning]
        tier: standard
        config_alias: gemini
        status: active
        notes: "Pro reservado para tasks que precisam de raciocinio profundo (code, architecture, decomposition). Para tasks medium/economy usar gemini-2.5-flash. Pro tem outage 503 sustentado em 2026-05-02 (saturacao do tier compartilhado)."
      gemini-2.5-flash:
        display: "Gemini 2.5 Flash"
        input_cost_per_mtok: 0.30
        output_cost_per_mtok: 2.50
        max_tokens: 65536
        rpm: 60
        capabilities: [fast_inference, classification, summarization, data_processing, bulk_processing]
        tier: economy
        config_alias: gemini_flash
        status: active
        notes: "Adicionado 2026-05-02 v3. Mantem 1M ctx; ~5x mais barato que Pro; latencia ~3x menor. Tier de protecao quando Pro entra em outage."

  perplexity:
    display_name: "Perplexity"
    api_key_env: PERPLEXITY_API_KEY
    models:
      sonar-deep-research:
        display: "Sonar Deep Research"
        # 2026-04-14: upgrade sonar-pro -> sonar-deep-research.
        # Pricing Perplexity: $2/M input + $8/M output + $3/M reasoning + $5 per 1000 searches.
        # Valores abaixo capturam input/output; reasoning/search entram na calibracao auto.
        input_cost_per_mtok: 2.00
        output_cost_per_mtok: 8.00
        max_tokens: 8192
        rpm: 20
        capabilities: [deep_research, research, live_search, citations, fact_check]
        tier: premium
        config_alias: perplexity
        status: active

  groq:
    display_name: "Groq"
    api_key_env: GROQ_API_KEY
    models:
      meta-llama/llama-4-scout-17b-16e-instruct:
        display: "Llama 4 Scout 17B (16E Instruct)"
        # 2026-05-17 — upgrade Llama 3.3 70B -> Llama 4 Scout 17B 16E.
        # Pricing Groq Llama 4 Scout: $0.11/$0.34 por 1M tokens (real
        # validado em ping 17-05-2026). Pricing antigo 0.59/0.79 mantido
        # para compat com cost calculator que estima por config_alias.
        input_cost_per_mtok: 0.11
        output_cost_per_mtok: 0.34
        max_tokens: 32768
        rpm: 300
        capabilities: [classification, summarization, translation, fast_inference, code_review]
        tier: economy
        config_alias: groq
        status: active
        notes: "Llama 4 Scout (17B parametros ativos, 16 experts) — upgrade canonico desde 2026-05-17. Mantem velocidade LPU ~10x faster que outros providers. Pricing 5x mais barato que Llama 3.3 70B antigo."

  # 2026-05-17 — 6o provider canonico: xAI Grok (com K).
  # NAO confundir com Groq Inc (com Q) acima. xAI tem modelos proprios
  # (grok-4.3, grok-4.20-*) com diferencial unico de busca live em X/Twitter.
  # Conta canonica: alexandre.brt14@gmail.com / team caramaschigeo
  # Console: https://console.x.ai/team/038ac15a-6901-4d20-b15e-264ccdd5c563
  # API base URL: https://api.x.ai/v1 (OpenAI-compatible)
  # Pricing flat $1.25/$2.50 por 1M tokens em toda linha GA 4.3 + 4.20-*.
  # Linha pre-15-mai-2026 (grok-4-1-fast, grok-4-fast, grok-code-fast-1)
  # foi DEPRECATED em 15-mai-2026 — nao usar.
  xai:
    display_name: "xAI Grok"
    api_key_env: XAI_API_KEY
    models:
      grok-4.3:
        display: "Grok 4.3"
        input_cost_per_mtok: 1.25
        output_cost_per_mtok: 2.50
        max_tokens: 131072
        rpm: 1800
        capabilities: [realtime_search, live_x_data, reasoning, vision, function_calling, structured_outputs]
        tier: standard
        config_alias: grok
        status: active
        notes: "Flagship general-purpose. 1M context. Lancado 30-abr-2026. Tom edgy por padrao — exigir prompt explicito de tom neutro. Search_parameters ativa busca live em X/Twitter (cuidado: consome quota oculta)."
      grok-4.20-multi-agent-0309:
        display: "Grok 4.20 Multi-Agent"
        input_cost_per_mtok: 1.25
        output_cost_per_mtok: 2.50
        max_tokens: 131072
        rpm: 1800
        capabilities: [multi_agent_decomposition, long_context_2m, deep_reasoning, cross_check]
        tier: premium
        config_alias: grok_multi
        status: active
        notes: "4 agentes paralelos (Grok+Harper+Benjamin+Lucas) no mesmo call. 2M context. Para multi_perspective_decomposition e long_context_synthesis. Substitui o slot 'grok_heavy' do brief original (nao confundir com 'groq_heavy' da Groq Inc)."
      grok-4.20-0309-non-reasoning:
        display: "Grok 4.20 Fast (non-reasoning)"
        input_cost_per_mtok: 1.25
        output_cost_per_mtok: 2.50
        max_tokens: 131072
        rpm: 1800
        capabilities: [fast_inference, classification, extraction, live_search_quick]
        tier: economy
        config_alias: grok_fast
        status: active
        notes: "Variante rapida sem CoT interno. NAO substitui Groq (com Q) para bulk: Llama 3.3 70B em LPU mantem vantagem ~10x em throughput. Pricing nao tem desconto — recomendado apenas quando precisa de live X data + velocidade."
      # 2026-05-02 — alias groq_heavy NAO esta no catalog YAML por design.
      # O modelo real e controlado via env GROQ_HEAVY_MODEL e o LLMConfig
      # vem do dict hardcoded em src/config.py (caminho de fallback). Isso
      # permite trocar o modelo (ex: openai/gpt-oss-120b, qwen/qwen3-32b,
      # llama-4-scout-17b) sem editar o YAML. Default em config.py:
      # meta-llama/llama-4-scout-17b-16e-instruct (seguro). Producao recomendada:
      # openai/gpt-oss-120b (120B, 131K ctx, 56 reasoning tokens).

# Tier interno por familia (Sprint 3 — runtime). Acionado automaticamente
# por SmartRouter / Router._apply_claude_tier baseado em task.complexity.
tier_routing:
  claude_family:
    "1": claude-haiku-4-5
    "2": claude-haiku-4-5
    "3": claude-sonnet-4-6
    "4": claude-opus-4-7
    "5": claude-opus-4-7

# Task routing — capabilities required per task type
# 2026-05-02 — REBALANCEAMENTO: Gemini e Groq como protagonistas.
# Anthropic so e preferred em "architecture" e "critical_review".
task_routing:
  # 2026-05-17 Sprint 12 — RESEARCH com Perplexity como prioridade absoluta.
  # Fallback chain prioriza qualidade de fonte (Gemini Pro 1M ctx + Opus 4.7
  # raciocinio) sobre velocidade/custo. groq/groq_heavy so como ultimo recurso.
  # Cap 0.50 (era 0.35 pos-bateria 360) — deep research editorial e prioridade.
  research:
    required_capabilities: [research, live_search]
    preferred_provider: perplexity
    model_override: sonar-deep-research
    fallback: [google, anthropic, openai]
    fallback_models: [gemini-2.5-pro, claude-opus-4-7, gpt-5.5]
  # 2026-05-17 Sprint 12 — COPY PREMIUM ONLY (writing/copywriting/seo).
  # Fallback chain so cai em Anthropic (Opus 4.7) e Google (Gemini 2.5 Pro);
  # NUNCA em Sonnet/Haiku/Flash. Refletido em FALLBACK_CHAINS do config.py.
  writing:
    required_capabilities: [writing, seo]
    preferred_provider: openai
    model_override: gpt-5.5
    fallback: [anthropic, google, perplexity]
    fallback_models: [claude-opus-4-7, gemini-2.5-pro, sonar-deep-research]
  copywriting:
    required_capabilities: [writing, copywriting]
    preferred_provider: openai
    model_override: gpt-5.5
    fallback: [anthropic, google, perplexity]
    fallback_models: [claude-opus-4-7, gemini-2.5-pro, sonar-deep-research]
  seo:
    required_capabilities: [seo, writing]
    preferred_provider: openai
    model_override: gpt-5.5
    fallback: [anthropic, google, perplexity]
    fallback_models: [claude-opus-4-7, gemini-2.5-pro, sonar-deep-research]
  analysis:
    required_capabilities: [analysis, data_processing]
    preferred_provider: google
    model_override: gemini-2.5-flash
    fallback: [groq, openai, anthropic]
  architecture:
    required_capabilities: [architecture, deep_reasoning]
    preferred_provider: anthropic
    model_override: claude-opus-4-7
    fallback: [google, openai]
  critical_review:
    required_capabilities: [review, deep_reasoning]
    preferred_provider: anthropic
    model_override: claude-opus-4-7
    fallback: [google, openai]
  code:
    required_capabilities: [code_generation]
    preferred_provider: google
    model_override: gemini-2.5-pro
    fallback: [groq, anthropic, openai]
  code_generation:
    required_capabilities: [code_generation]
    preferred_provider: google
    fallback: [groq, anthropic, openai]
  code_review:
    required_capabilities: [code_review_heavy]
    preferred_provider: groq
    model_override: groq-heavy
    fallback: [google, anthropic]
  review:
    required_capabilities: [review, deep_reasoning]
    preferred_provider: google
    fallback: [groq, anthropic, openai]
  decomposition:
    required_capabilities: [decomposition]
    preferred_provider: google
    fallback: [groq, anthropic]
  classification:
    required_capabilities: [classification]
    preferred_provider: groq
    fallback: [google, anthropic]
  summarization:
    required_capabilities: [summarization]
    preferred_provider: groq
    fallback: [google]
  translation:
    required_capabilities: [translation]
    preferred_provider: groq
    fallback: [openai, google]
  extraction:
    required_capabilities: [structured_extraction]
    preferred_provider: groq
    model_override: groq-heavy
    fallback: [google, openai]
  data_processing:
    required_capabilities: [data_processing]
    preferred_provider: google
    model_override: gemini-2.5-flash
    fallback: [groq]
  fact_check:
    required_capabilities: [fact_check, live_search]
    preferred_provider: perplexity
    model_override: sonar-deep-research
    fallback: [google, anthropic, openai]
    fallback_models: [gemini-2.5-pro, claude-opus-4-7, gpt-5.5]

# Budget limits — alinhados com src/config.FINOPS_DAILY_LIMITS
# 2026-05-09 — modo POTENCIA MAXIMA: caps reset por ordem direta do CEO Brasil GEO
# para suportar bateria de 5 waves (12+ aulas T1-T4 com pesquisa profunda).
budgets:
  daily_limits:
    anthropic: 100.00
    openai: 50.00
    google: 50.00
    perplexity: 30.00
    groq: 30.00
    global: 250.00
  per_run_max: 50.00
  alert_threshold: 0.80
  block_threshold: 0.95

# Provider concentration cap — alinhado com src/config.PROVIDER_SHARE_CAP.
# Historia:
#   * 2026-05-02 v1: rebalanceamento Gemini/Groq como protagonistas.
#   * 2026-05-09 v2: Anthropic 0.30 -> 0.40 (Sonnet+Haiku precisavam folga
#     pos-bateria de 5 waves), Google 0.55 -> 0.45 (blast radius outage).
#   * 2026-05-13 v3: Perplexity 0.50 -> 0.35 (research dominava 84% wall
#     time em runs de research profunda — bateria 360).
#   * 2026-05-17 Sprint 12: Perplexity RESTAURADA 0.35 -> 0.50 pela
#     diretriz "Perplexity prioridade em research". Decomposicao adaptativa
#     do adaptive_decomposer controla wall time agora; cap rigido sufocava
#     deep research editorial.
caps:
  default_share: 0.50
  per_provider:
    anthropic: 0.40
    openai: 0.45
    google: 0.45
    perplexity: 0.50
    groq: 0.65
    xai: 0.30

# Operational modes
modes:
  production:
    description: "Optimize quality/cost/latency"
    force_all_models: false
    max_retries: 3
  showcase:
    description: "Force usage of all 5 providers for demonstration"
    force_all_models: true
    max_retries: 2
  exploration:
    description: "Collect data to improve routing"
    force_all_models: false
    explore_probability: 0.2
    max_retries: 2
