# Task routing — capabilities required per task type
task_routing:
  research:
    required_capabilities: [research, live_search]
    preferred_provider: perplexity
    fallback: [openai, anthropic]
  writing:
    required_capabilities: [writing, seo]
    preferred_provider: openai
    fallback: [anthropic]
  analysis:
    required_capabilities: [analysis, data_processing]
    preferred_provider: google
    fallback: [groq, openai]
  architecture:
    required_capabilities: [architecture, deep_reasoning]
    preferred_provider: anthropic
    model_override: claude-opus-4-20250514
    fallback: [openai]
  code_generation:
    required_capabilities: [code_generation]
    preferred_provider: anthropic
    fallback: [openai]
  review:
    required_capabilities: [review, deep_reasoning]
    preferred_provider: anthropic
    fallback: [openai]
  classification:
    required_capabilities: [classification]
    preferred_provider: groq
    fallback: [google, anthropic]
  summarization:
    required_capabilities: [summarization]
    preferred_provider: groq
    fallback: [google]
  translation:
    required_capabilities: [translation]
    preferred_provider: groq
    fallback: [openai]
  data_processing:
    required_capabilities: [data_processing]
    preferred_provider: google
    fallback: [groq]

# Budget limits
budgets:
  daily_limits:
    anthropic: 5.00
    openai: 2.00
    google: 1.00
    perplexity: 1.00
    groq: 2.00
    global: 10.00
  per_run_max: 15.00
  alert_threshold: 0.80  # Alert at 80% of daily limit

# Operational modes
modes:
  production:
    description: "Optimize quality/cost/latency"
    force_all_models: false
    max_retries: 3
  showcase:
    description: "Force usage of all 5 models for demonstration"
    force_all_models: true
    max_retries: 2
  exploration:
    description: "Collect data to improve routing"
    force_all_models: false
    explore_probability: 0.2
    max_retries: 2
